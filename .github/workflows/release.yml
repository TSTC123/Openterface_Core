name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.0.1)'
        required: true
        type: string
      draft:
        description: 'Create as draft release'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-artifacts:
    name: Build ${{ matrix.label }} artifact
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
            artifact_name: linux-libs
            library_paths: build/lib/libopenterface_core_common.a build/lib/libopenterface_core_input.a build/lib/libopenterface_protocol_ch9329.a build/lib/libopenterface_core_native.a build/lib/libopenterface_watchdog.a build/lib/libopenterface_platform_internal.a
            release_prefix: openterface-core-linux
          - os: macos-latest
            label: macos
            artifact_name: macos-libs
            library_paths: build/lib/libopenterface_core_common.a build/lib/libopenterface_core_input.a build/lib/libopenterface_protocol_ch9329.a build/lib/libopenterface_core_native.a build/lib/libopenterface_watchdog.a build/lib/libopenterface_platform_internal.a
            release_prefix: openterface-core-macos
          - os: windows-latest
            label: windows
            artifact_name: windows-libs
            library_paths: build/Release/openterface_core_common.lib build/Release/openterface_core_input.lib build/Release/openterface_protocol_ch9329.lib build/Release/openterface_core_native.lib build/Release/openterface_watchdog.lib build/Release/openterface_platform_internal.lib
            release_prefix: openterface-core-windows

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Run tests
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Collect Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p out/${{ matrix.artifact_name }}
          for lib in ${{ matrix.library_paths }}; do
            cp "$lib" "out/${{ matrix.artifact_name }}/"
          done

      - name: Collect Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "out/${{ matrix.artifact_name }}" | Out-Null
          "${{ matrix.library_paths }}" -split ' ' | ForEach-Object {
            Copy-Item $_ "out/${{ matrix.artifact_name }}/"
          }

      - name: Upload library artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: out/${{ matrix.artifact_name }}/

      - name: Upload header artifact
        if: matrix.label == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: headers
          path: include/openterface/

  create-release:
    name: Create release
    runs-on: ubuntu-latest
    needs: build-artifacts

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-libs
          path: out/linux-libs

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-libs
          path: out/macos-libs

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-libs
          path: out/windows-libs

      - name: Download headers
        uses: actions/download-artifact@v4
        with:
          name: headers
          path: out/include

      - name: Package release assets
        run: |
          mkdir -p out/artifacts
          tar czf out/artifacts/openterface-core-headers.tar.gz -C out/include .
          tar czf out/artifacts/openterface-core-linux.tar.gz -C out/linux-libs .
          tar czf out/artifacts/openterface-core-macos.tar.gz -C out/macos-libs .
          tar czf out/artifacts/openterface-core-windows.tar.gz -C out/windows-libs .

      - name: Create tag
        id: tag
        run: |
          TAG="v${{ github.event.inputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
          DRAFT: ${{ github.event.inputs.draft }}
        run: |
          ARGS=(--title "Release ${VERSION}" --generate-notes)
          if [ "$DRAFT" = "true" ]; then
            ARGS+=(--draft)
          fi
          if ! gh release view "${{ steps.tag.outputs.tag }}" >/dev/null 2>&1; then
            gh release create "${{ steps.tag.outputs.tag }}" "${ARGS[@]}"
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" \
            out/artifacts/openterface-core-headers.tar.gz \
            out/artifacts/openterface-core-linux.tar.gz \
            out/artifacts/openterface-core-macos.tar.gz \
            out/artifacts/openterface-core-windows.tar.gz \
            --clobber
