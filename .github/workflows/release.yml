name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.0.1)'
        required: true
        type: string
      draft:
        description: 'Create as draft release'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-artifacts:
    name: Build ${{ matrix.label }} artifact
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
            artifact_name: linux-lib
            library_path: build/libkeymod.a
            release_name: libkeymod-linux.a
          - os: macos-latest
            label: macos
            artifact_name: macos-lib
            library_path: build/libkeymod.a
            release_name: libkeymod-macos.a
          - os: windows-latest
            label: windows
            artifact_name: windows-lib
            library_path: build/Release/keymod.lib
            release_name: keymod-windows.lib

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Run tests
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Collect Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p out/${{ matrix.artifact_name }}
          cp "${{ matrix.library_path }}" "out/${{ matrix.artifact_name }}/${{ matrix.release_name }}"

      - name: Collect Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "out/${{ matrix.artifact_name }}" | Out-Null
          Copy-Item "${{ matrix.library_path }}" "out/${{ matrix.artifact_name }}/${{ matrix.release_name }}"

      - name: Upload library artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: out/${{ matrix.artifact_name }}/

      - name: Upload header artifact
        if: matrix.label == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: headers
          path: include/

  create-release:
    name: Create release
    runs-on: ubuntu-latest
    needs: build-artifacts

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-lib
          path: out/linux-lib

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-lib
          path: out/macos-lib

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-lib
          path: out/windows-lib

      - name: Download headers
        uses: actions/download-artifact@v4
        with:
          name: headers
          path: out/include

      - name: Package release assets
        run: |
          mkdir -p out/artifacts
          tar czf out/artifacts/keymod-headers.tar.gz -C out/include .
          cp out/linux-lib/libkeymod-linux.a out/artifacts/libkeymod-linux.a
          cp out/macos-lib/libkeymod-macos.a out/artifacts/libkeymod-macos.a
          cp out/windows-lib/keymod-windows.lib out/artifacts/keymod-windows.lib

      - name: Create tag
        id: tag
        run: |
          TAG="v${{ github.event.inputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
          DRAFT: ${{ github.event.inputs.draft }}
        run: |
          ARGS=(--title "Release ${VERSION}" --generate-notes)
          if [ "$DRAFT" = "true" ]; then
            ARGS+=(--draft)
          fi
          gh release create "${{ steps.tag.outputs.tag }}" \
            out/artifacts/libkeymod-linux.a \
            out/artifacts/libkeymod-macos.a \
            out/artifacts/keymod-windows.lib \
            out/artifacts/keymod-headers.tar.gz \
            "${ARGS[@]}"
